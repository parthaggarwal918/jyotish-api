services:
  jyotish_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: jyotish_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-9393}:8080"
    env_file:
      - ./api/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s